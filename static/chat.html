<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Python API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        .chat-message { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator::after { content: '...'; animation: typing 1.5s infinite; }
        @keyframes typing { 0%, 100% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
        .code-block { font-family: 'Monaco', 'Menlo', 'Consolas', monospace; }
        .tool-call { border-left: 3px solid #3b82f6; }
        .tool-result { border-left: 3px solid #10b981; }
        .tool-error { border-left: 3px solid #ef4444; }
        .thinking-box { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); border: 1px solid #3b82f6; }
        .sidebar-scroll { scrollbar-width: thin; scrollbar-color: #4b5563 #1f2937; }
        .sidebar-scroll::-webkit-scrollbar { width: 6px; }
        .sidebar-scroll::-webkit-scrollbar-track { background: #1f2937; }
        .sidebar-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        .message-content pre { margin: 0.5rem 0; border-radius: 0.5rem; }
        .message-content code { font-family: 'Monaco', 'Menlo', 'Consolas', monospace; }
        .message-content p { margin: 0.5rem 0; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex overflow-hidden">
    <!-- Left Sidebar -->
    <aside id="sidebar" class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
        <div class="p-4 border-b border-gray-700">
            <h1 class="text-lg font-bold text-blue-400 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
                Claude Code
            </h1>
            <button onclick="newChat()" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                新会话
            </button>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto sidebar-scroll p-2 space-y-1">
            <!-- Sessions will be loaded here -->
        </div>
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
            <div id="connection-status" class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                已连接
            </div>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h2 id="chat-title" class="font-semibold text-lg truncate">新会话</h2>
                <span id="thinking-badge" class="hidden px-2 py-1 bg-blue-900 text-blue-300 text-xs rounded-full flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-blue-400 rounded-full animate-pulse"></span>
                    思考中
                </span>
            </div>
            <div class="flex items-center gap-3">
                <select id="model-select" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-sm" onchange="changeModel()">
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="claude-3-sonnet">Claude 3 Sonnet</option>
                </select>
                <button onclick="clearChat()" class="p-2 hover:bg-gray-700 rounded-lg" title="清空对话">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Messages Container -->
        <div id="messages-container" class="flex-1 overflow-y-auto sidebar-scroll px-4 py-6 space-y-6">
            <!-- Welcome Message -->
            <div class="text-center py-12">
                <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Claude Code Python API</h2>
                <p class="text-gray-400 mb-6">基于 Python 的 Claude Code 实现，支持文件操作、代码编辑、命令执行等工具。</p>

                <!-- Quick Commands -->
                <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-3 px-4">
                    <div onclick="insertCommand('帮我查看当前目录的文件结构')" class="cursor-pointer bg-gray-800 hover:bg-gray-700 p-3 rounded-lg text-left transition">
                        <div class="font-medium text-blue-400">📁 查看文件结构</div>
                        <div class="text-xs text-gray-500">使用 glob 和 bash 查看目录</div>
                    </div>
                    <div onclick="insertCommand('帮我搜索包含 \"TODO\" 的代码')" class="cursor-pointer bg-gray-800 hover:bg-gray-700 p-3 rounded-lg text-left transition">
                        <div class="font-medium text-green-400">🔍 搜索代码</div>
                        <div class="text-xs text-gray-500">使用 grep 搜索文件内容</div>
                    </div>
                    <div onclick="insertCommand('帮我读取 src/main.py 文件')" class="cursor-pointer bg-gray-800 hover:bg-gray-700 p-3 rounded-lg text-left transition">
                        <div class="font-medium text-yellow-400">📖 读取文件</div>
                        <div class="text-xs text-gray-500">使用 read_file 工具</div>
                    </div>
                    <div onclick="insertCommand('帮我执行 ls -la 命令')" class="cursor-pointer bg-gray-800 hover:bg-gray-700 p-3 rounded-lg text-left transition">
                        <div class="font-medium text-red-400">⚡ 执行命令</div>
                        <div class="text-xs text-gray-500">使用 bash 工具</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-gray-800 border-t border-gray-700 px-4 py-4">
            <div class="flex gap-3">
                <div class="flex-1 relative">
                    <textarea id="message-input" rows="1" placeholder="输入消息... (Shift+Enter 换行)"
                        class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 pr-12 resize-none focus:outline-none focus:border-blue-500 transition"
                        onkeydown="handleInputKeydown(event)"
                        oninput="autoResize(this)"></textarea>

                    <button onclick="sendMessage()" id="send-btn"
                        class="absolute right-2 bottom-2 p-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="mt-2 text-xs text-gray-500 text-center">
                支持工具：read_file, write_file, edit_file, bash, glob, grep, web_search, web_fetch
            </div>
        </div>
    </main>

    <script>
        // 全局状态
        let currentConversationId = null;
        let isProcessing = false;
        let eventSource = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            autoResize(document.getElementById('message-input'));
        });

        // 创建新会话
        async function newChat() {
            try {
                const response = await fetch('/chat/create', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    currentConversationId = data.data.conversation_id;
                    document.getElementById('chat-title').textContent = `会话 ${currentConversationId}`;
                    clearMessages();
                    addMessage('system', '新会话已创建，开始对话吧！');
                    loadSessions();
                }
            } catch (error) {
                console.error('创建会话失败:', error);
                showError('创建会话失败');
            }
        }

        // 加载会话列表
        async function loadSessions() {
            // 简化版：从 localStorage 加载
            const sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
            const list = document.getElementById('session-list');
            list.innerHTML = sessions.map(s => `
                <div onclick="loadConversation('${s.id}')" class="p-2 hover:bg-gray-700 rounded cursor-pointer text-sm truncate ${s.id === currentConversationId ? 'bg-gray-700' : ''}">
                    ${s.title}
                </div>
            `).join('');
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();

            if (!message || isProcessing) return;

            // 如果没有会话，先创建
            if (!currentConversationId) {
                await newChat();
            }

            // 添加用户消息到界面
            addMessage('user', message);
            input.value = '';
            autoResize(input);

            // 发送请求
            isProcessing = true;
            updateUIState();

            try {
                // 使用 SSE 流式接收
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: currentConversationId
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                isProcessing = false;
                                updateUIState();
                                continue;
                            }
                            try {
                                const event = JSON.parse(data);
                                handleEvent(event);
                            } catch (e) {
                                console.error('解析事件失败:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('发送消息失败:', error);
                showError('发送消息失败: ' + error.message);
                isProcessing = false;
                updateUIState();
            }
        }

        // 处理事件
        function handleEvent(event) {
            switch (event.type) {
                case 'user_message':
                    // 已手动添加
                    break;

                case 'assistant_message':
                    addMessage('assistant', event.content);
                    break;

                case 'tool_call':
                case 'state_change':
                    if (event.state === 'thinking') {
                        document.getElementById('thinking-badge').classList.remove('hidden');
                    } else if (event.state === 'tool_calling') {
                        addToolCall(event.tool_calls || []);
                    } else {
                        document.getElementById('thinking-badge').classList.add('hidden');
                    }
                    break;

                case 'tool_result':
                    addToolResult(event);
                    break;

                case 'error':
                    showError(event.error);
                    isProcessing = false;
                    updateUIState();
                    break;
            }
        }

        // 添加消息到界面
        function addMessage(role, content) {
            const container = document.getElementById('messages-container');
            const welcome = container.querySelector('.text-center.py-12');
            if (welcome) welcome.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message flex gap-4 ${role === 'user' ? 'flex-row-reverse' : ''}`;

            const avatar = role === 'user'
                ? `<div class="w-8 h-8 bg-gray-600 rounded-full flex items-center justify-center text-sm">我</div>`
                : `<div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                </div>`;

            const contentClass = role === 'user'
                ? 'bg-blue-600 text-white'
                : 'bg-gray-800 text-gray-100';

            messageDiv.innerHTML = `
                ${avatar}
                <div class="flex-1 ${role === 'user' ? 'text-right' : ''}">
                    <div class="inline-block max-w-3xl ${contentClass} rounded-lg px-4 py-2 message-content">
                        ${formatContent(content)}
                    </div>
                </div>
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;

            // 高亮代码
            messageDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightBlock(block);
            });
        }

        // 添加工具调用显示
        function addToolCall(toolCalls) {
            const container = document.getElementById('messages-container');
            const toolDiv = document.createElement('div');
            toolDiv.className = 'chat-message flex gap-4';

            const toolsHtml = toolCalls.map(tc => `
                <div class="tool-call bg-gray-800 rounded-lg px-4 py-2 mb-2">
                    <div class="text-blue-400 text-sm font-medium">🔧 ${tc.name}</div>
                    <pre class="text-xs text-gray-400 mt-1 overflow-x-auto">${JSON.stringify(tc.arguments, null, 2)}</pre>
                </div>
            `).join('');

            toolDiv.innerHTML = `
                <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    </svg>
                </div>
                <div class="flex-1">
                    ${toolsHtml}
                </div>
            `;

            container.appendChild(toolDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 添加工具结果显示
        function addToolResult(event) {
            const container = document.getElementById('messages-container');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'chat-message flex gap-4';

            const resultClass = event.success ? 'tool-result' : 'tool-error';
            const icon = event.success ? '✓' : '✗';
            const color = event.success ? 'text-green-400' : 'text-red-400';

            let resultContent = '';
            if (typeof event.result === 'string') {
                resultContent = event.result;
            } else {
                resultContent = JSON.stringify(event.result, null, 2);
            }

            // 截断过长的结果
            const maxLength = 500;
            const isTruncated = resultContent.length > maxLength;
            const displayContent = isTruncated
                ? resultContent.substring(0, maxLength) + '...'
                : resultContent;

            resultDiv.innerHTML = `
                <div class="w-8"></div>
                <div class="flex-1">
                    <div class="${resultClass} bg-gray-800 rounded-lg px-4 py-2">
                        <div class="${color} text-sm font-medium">${icon} ${event.name} 结果</div>
                        <pre class="text-xs text-gray-400 mt-1 overflow-x-auto">${displayContent}</pre>
                        ${isTruncated ? `<div class="text-xs text-gray-500 mt-1">结果已截断，完整结果保存在对话历史中</div>` : ''}
                    </div>
                </div>
            `;

            container.appendChild(resultDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 格式化内容
        function formatContent(content) {
            if (!content) return '';
            // 使用 marked 解析 Markdown
            return marked.parse(content);
        }

        // 清空消息
        function clearMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
        }

        // 清空对话
        function clearChat() {
            if (currentConversationId) {
                fetch(`/chat/${currentConversationId}`, { method: 'DELETE' });
            }
            clearMessages();
            currentConversationId = null;
            document.getElementById('chat-title').textContent = '新会话';
        }

        // 插入命令
        function insertCommand(text) {
            const input = document.getElementById('message-input');
            input.value = text;
            input.focus();
            autoResize(input);
        }

        // 自动调整输入框大小
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        // 处理键盘输入
        function handleInputKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 更新 UI 状态
        function updateUIState() {
            const btn = document.getElementById('send-btn');
            const input = document.getElementById('message-input');

            btn.disabled = isProcessing;
            input.disabled = isProcessing;

            if (isProcessing) {
                document.getElementById('thinking-badge').classList.remove('hidden');
            } else {
                document.getElementById('thinking-badge').classList.add('hidden');
            }
        }

        // 显示错误
        function showError(message) {
            const container = document.getElementById('messages-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'chat-message flex gap-4';
            errorDiv.innerHTML = `
                <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-sm">!</div>
                <div class="flex-1">
                    <div class="bg-red-900/50 border border-red-600 text-red-200 rounded-lg px-4 py-2">
                        ${message}
                    </div>
                </div>
            `;
            container.appendChild(errorDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 切换模型
        function changeModel() {
            const model = document.getElementById('model-select').value;
            // 可以在这里保存模型选择到 localStorage
            localStorage.setItem('selectedModel', model);
        }

        // 加载保存的模型选择
        const savedModel = localStorage.getItem('selectedModel');
        if (savedModel) {
            document.getElementById('model-select').value = savedModel;
        }
    </script>
</body>
</html>
